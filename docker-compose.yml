services:
  bot:
    build: .
    container_name: firebot
    restart: unless-stopped
    environment:
      - FONT_PATH=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
      - TZ=Asia/Kolkata
      - MEDIA_BASE_URL=${MEDIA_BASE_URL:-https://media.fireeditsclub.deepanalve.dev}
      - GCP_PROJECT=${GCP_PROJECT:-hokuai}
      - GCP_LOCATION=${GCP_LOCATION:-us-central1}
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/firebot/secrets/vertex-sa.json
    volumes:
      # SQLite + secrets stay on alveta's local disk (CIFS + SQLite = corruption risk).
      - /etc/dokploy/firebot/data:/opt/firebot/data
      - /etc/dokploy/firebot/secrets:/opt/firebot/secrets:ro
      # Bulky video files go to the Hetzner Storage Box via CIFS (988G, plenty of headroom).
      - /mnt/storagebox/firebot/media:/opt/firebot/data/media
      - /mnt/storagebox/firebot/work:/opt/firebot/data/work
      - /mnt/storagebox/firebot/compilations:/opt/firebot/data/compilations
      - /mnt/storagebox/firebot/uploads:/opt/firebot/data/uploads
    # Cron-style loop: every 5 minutes run main.py and log output
    command: >
      sh -c "while true; do
               echo '[tick]' $$(date -u +%FT%TZ);
               python main.py run || echo '[tick failed]';
               sleep 300;
             done"

  media:
    image: nginx:alpine
    container_name: firebot-media
    restart: unless-stopped
    volumes:
      - /mnt/storagebox/firebot/uploads:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.firebot-media.rule=Host(`media.fireeditsclub.deepanalve.dev`)
      - traefik.http.routers.firebot-media.entrypoints=websecure
      - traefik.http.routers.firebot-media.tls.certresolver=letsencrypt
      - traefik.http.services.firebot-media.loadbalancer.server.port=80

networks:
  default:
    name: dokploy-network
    external: true
